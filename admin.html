<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Agência DPX</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <script>

            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        surface: { 700: '#1e1e2e', 800: '#151521', 900: '#0c0c14', 950: '#08080e' },
                        primary: { DEFAULT: '#e8772e', light: '#f0944d', dark: '#c75f1a' },
                        accent: '#e8772e',
                        muted: { DEFAULT: '#6b6b80', light: '#8b8ba0' }
                    }

    <style>
        * { scrollbar-width: thin; scrollbar-color: #2a2a3e #0c0c14; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0c0c14; }
        ::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 3px; }
        body { background: #0c0c14; }

        .card { background: #111119; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; }
        .card:hover { border-color: rgba(255,255,255,0.1); }

        .btn-action {
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary-sm {
            background: linear-gradient(135deg, #e8772e, #c75f1a);
            color: white;
        }
        .btn-primary-sm:hover { box-shadow: 0 4px 16px rgba(232,119,46,0.3); }

        .btn-ghost {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: #b0b0c0;
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.08); color: white; }

        .form-item {
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .form-item:hover { background: rgba(255,255,255,0.03); }
        .form-item.active {
            background: rgba(232,119,46,0.06);
            border-color: rgba(232,119,46,0.2);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-local { background: rgba(99,102,241,0.15); color: #818cf8; }
        .badge-supabase { background: rgba(52,211,153,0.15); color: #34d399; }
        .badge-novo { background: rgba(59,130,246,0.15); color: #60a5fa; }
        .badge-analise { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .badge-concluido { background: rgba(52,211,153,0.15); color: #34d399; }

        .collapse-header {
            cursor: pointer;
            padding: 12px 16px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .collapse-header:hover { background: rgba(255,255,255,0.03); }
        .collapse-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .collapse-content.open { max-height: 2000px; }

        .metric-card {
            background: #111119;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 20px 24px;
        }

        .score-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.06); overflow: hidden; }
        .score-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.4s ease; }

        .detail-row { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .detail-row:last-child { border-bottom: none; }
    </style>
</head>

    <script>
        // ==========================================
        // SUPABASE CONFIG
        // ==========================================
        const SUPABASE_URL = 'https://ajxocisljljuqkinfisw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqeG9jaXNsamxqdXFraW5maXN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg2MTI3MTksImV4cCI6MjA2NDE4ODcxOX0.zNF3r_KK7I7fQm4-7kBlQwwcWwyMqEp4i6cOYWxfosY';

        let supabaseClient = null;
        let currentUser = null;
        let formularios = [];
        let selectedIndex = -1;

        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (e) {
            console.warn('Supabase não disponível');
        }

        // ==========================================
        // AUTH CHECK
        // ==========================================
        (async () => {
            let authenticated = false;

            if (supabaseClient) {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    currentUser = session.user;
                    authenticated = true;
                }
            }

            // Fallback: check localStorage session
            if (!authenticated) {
                const offlineSession = localStorage.getItem('dpx_admin_session');
                if (offlineSession) {
                    const parsed = JSON.parse(offlineSession);
                    // Session valid for 24h
                    if (Date.now() - parsed.timestamp < 86400000) {
                        currentUser = parsed.user;
                        authenticated = true;
                    }
                }
            }

            if (!authenticated) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('userEmail').textContent = currentUser.email;
            loadFormularios();
        })();

        // ==========================================
        // LOGOUT
        // ==========================================
        async function handleLogout() {
            if (supabaseClient) {
                await supabaseClient.auth.signOut();
            }
            localStorage.removeItem('dpx_admin_session');
            window.location.href = 'index.html';
        }

        // ==========================================
        // SCORE DE COMPLEXIDADE (0-100)
        // ==========================================
        function calcularScore(dados) {
            let score = 0;
            const d = dados || {};

            // Canais (0-20 pts)
            const canais = d.canais_atendimento || d.canais || [];
            if (Array.isArray(canais)) {
                score += Math.min(canais.length * 4, 20);
            }

            // Integrações (0-15 pts)
            const integracoes = d.integracoes_necessarias || d.integracoes || [];
            if (Array.isArray(integracoes)) {
                score += Math.min(integracoes.length * 5, 15);
            }

            // Volume atendimentos (0-15 pts)
            const volume = d.volume_atendimentos || d.volume_mensal || '';
            if (volume.includes('1000') || volume.includes('alto') || volume.includes('+')) score += 15;
            else if (volume.includes('500') || volume.includes('médio')) score += 10;
            else if (volume.includes('100') || volume.includes('baixo')) score += 5;

            // Personalização (0-15 pts)
            const personalizacao = d.nivel_personalizacao || d.personalizacao || '';
            if (personalizacao.includes('alto') || personalizacao.includes('total')) score += 15;
            else if (personalizacao.includes('médio') || personalizacao.includes('moderado')) score += 10;
            else if (personalizacao.includes('básico')) score += 5;

            // Multilingue (0-10 pts)
            if (d.multilingue === true || d.multilinguagem === 'sim' || d.idiomas?.length > 1) score += 10;

            // Voz (0-10 pts)
            if (d.atendimento_voz === true || d.voz === 'sim' || (Array.isArray(canais) && canais.some(c => typeof c === 'string' && c.toLowerCase().includes('voz')))) score += 10;

            // Complexidade do FAQ (0-15 pts)
            const faq = d.faq || d.perguntas_frequentes || [];
            if (Array.isArray(faq)) {
                score += Math.min(faq.length * 3, 15);
            }

            return Math.min(score, 100);
        }

        // ==========================================
        // ESTIMATIVA DE PREÇO
        // ==========================================
        function calcularPreco(dados) {
            let preco = 5000; // Base
            const d = dados || {};

            // Faturamento
            const fat = d.faturamento_mensal || d.faturamento || '';
            if (fat.includes('1M') || fat.includes('milhão') || fat.includes('1.000.000')) preco *= 2.5;
            else if (fat.includes('500') || fat.includes('500K')) preco *= 2;
            else if (fat.includes('100') || fat.includes('100K')) preco *= 1.5;

            // Colaboradores
            const colab = parseInt(d.num_colaboradores || d.colaboradores || d.funcionarios || '0');
            if (colab > 100) preco *= 1.5;
            else if (colab > 50) preco *= 1.3;
            else if (colab > 10) preco *= 1.1;

            // Canais
            const canais = d.canais_atendimento || d.canais || [];
            if (Array.isArray(canais)) preco += canais.length * 500;

            // Integrações
            const integracoes = d.integracoes_necessarias || d.integracoes || [];
            if (Array.isArray(integracoes)) preco += integracoes.length * 800;

            // Score de complexidade como fator
            const score = calcularScore(d);
            if (score > 80) preco *= 1.4;
            else if (score > 60) preco *= 1.2;
            else if (score > 30) preco *= 1.1;

            return Math.round(preco);
        }

        // ==========================================
        // LOAD FORMULARIOS
        // ==========================================
        async function loadFormularios() {
            formularios = [];

            // 1. Load from Supabase
            if (supabaseClient) {
                try {
                    const { data, error } = await supabaseClient
                        .from('Formularios - IA')
                        .select('*')
                        .order('criado_em', { ascending: false });

                    if (error) {
                        console.error('Supabase load error:', error);
                    }
                    if (!error && data) {
                        data.forEach(row => {
                            formularios.push({
                                id: row.id,
                                source: 'supabase',
                                created_at: row.criado_em || row['data e hora'],
                                dados: row.dados || row,
                                nome_empresa: row.nome_empresa || row.dados?.empresa?.nome || 'Sem nome',
                                responsavel_nome: row.responsavel_nome || row.dados?.contato?.nome || '',
                                responsavel_email: row.responsavel_email || row.dados?.contato?.email || '',
                                status: row.status || 'novo',
                                score: row.score_complexidade || calcularScore(row.dados),
                                valor: row.valor_estimado || calcularPreco(row.dados)
                            });
                        });
                    }
                } catch (e) {
                    console.warn('Erro ao carregar do Supabase:', e);
                }
            }

            // 2. Load from LocalStorage
            loadLocalStorage();

            // 3. Update UI
            renderFormList();
            updateMetrics();
        }

        function loadLocalStorage() {
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('formulario_') || key.startsWith('dpx_form_')) {
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        // Avoid duplicates (check by empresa name + email)
                        const nome = data?.empresa?.nome || data?.nome_empresa || 'Sem nome';
                        const email = data?.contato?.email || data?.responsavel_email || '';
                        const isDuplicate = formularios.some(f =>
                            f.nome_empresa === nome && f.responsavel_email === email && f.source === 'supabase'
                        );
                        if (!isDuplicate) {
                            formularios.push({
                                id: key,
                                source: 'local',
                                created_at: data.created_at || data.timestamp || new Date().toISOString(),
                                dados: data,
                                nome_empresa: nome,
                                responsavel_nome: data?.contato?.nome || data?.responsavel_nome || '',
                                responsavel_email: email,
                                status: data.status || 'novo',
                                score: calcularScore(data),
                                valor: calcularPreco(data)
                            });
                        }
                    } catch (e) { /* skip invalid */ }
                }
            }
        }

        // ==========================================
        // SYNC LOCALSTORAGE → SUPABASE
        // ==========================================
        async function syncLocalStorage() {
            if (!supabaseClient) {
                alert('Supabase não está configurado. Sincronização não disponível.');
                return;
            }

            const localForms = formularios.filter(f => f.source === 'local');
            if (localForms.length === 0) {
                alert('Nenhum formulário local para sincronizar.');
                return;
            }

            let synced = 0;
            for (const form of localForms) {
                try {
                    const { error } = await supabaseClient.from('Formularios - IA').insert({
                        dados: form.dados,
                        nome_empresa: form.nome_empresa,
                        responsavel_nome: form.responsavel_nome,
                        responsavel_email: form.responsavel_email,
                        status: form.status,
                        score_complexidade: form.score,
                        valor_estimado: form.valor,
                        versao_formulario: 'v2.0'
                    });
                    if (!error) {
                        localStorage.removeItem(form.id);
                        synced++;
                    }
                } catch (e) {
                    console.error('Erro ao sincronizar:', e);
                }
            }

            alert(`${synced} de ${localForms.length} formulários sincronizados com sucesso!`);
            loadFormularios();
        }

        function toggleCollapse(header) {

                content.style.maxHeight = content.scrollHeight + 'px';

        async function deleteFormulario() {
            if (selectedIndex < 0) return;
            const form = formularios[selectedIndex];

            if (!confirm(`Deseja excluir o formulário de "${form.nome_empresa}"?`)) return;

            if (form.source === 'supabase' && supabaseClient) {
                const { error } = await supabaseClient
                    .from('Formularios - IA')
                    .delete()
                    .eq('id', form.id);
                if (error) {
                    alert('Erro ao excluir do Supabase: ' + error.message);
                    return;
                }
            } else if (form.source === 'local') {
                localStorage.removeItem(form.id);
            }

            formularios.splice(selectedIndex, 1);
            selectedIndex = -1;
            document.getElementById('detailEmpty').classList.remove('hidden');
            document.getElementById('detailContent').classList.add('hidden');
            renderFormList();
            updateMetrics();
        }

        function exportCSV() {
            const data = getExportData();
            if (data.length === 0) { alert('Nenhum dado para exportar'); return; }

            const headers = Object.keys(data[0]);
            const csv = [
                headers.join(';'),
                ...data.map(row => headers.map(h => `"${row[h] || ''}"`).join(';'))
            ].join('\n');

            downloadFile(csv, 'formularios_dpx.csv', 'text/csv;charset=utf-8');
        }

        function exportXLSX() {
            const data = getExportData();
            if (data.length === 0) { alert('Nenhum dado para exportar'); return; }

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Formulários');

            // Style header
            const range = XLSX.utils.decode_range(ws['!ref']);
            for (let c = range.s.c; c <= range.e.c; c++) {
                const addr = XLSX.utils.encode_cell({ r: 0, c });
                if (ws[addr]) ws[addr].s = { font: { bold: true } };
            }

            // Column widths
            ws['!cols'] = [
                { wch: 30 }, { wch: 25 }, { wch: 30 }, { wch: 12 },
                { wch: 10 }, { wch: 12 }, { wch: 8 }, { wch: 15 }
            ];

            XLSX.writeFile(wb, 'formularios_dpx.xlsx');
        }

        // ==========================================
        // PDF EXPORT
        // ==========================================
        function buildPDFForForm(form) {
            if (!window.jspdf) {
                alert('Biblioteca PDF não carregou. Recarregue a página e tente novamente.');
                return null;
            }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const d = form.dados || {};
            const pageWidth = doc.internal.pageSize.getWidth();
            const margin = 14;
            const contentStart = 72;
            const contentWidth = pageWidth - contentStart - margin;
            let y = 15;

            // Strip emojis and special chars that break jsPDF encoding
            const clean = (str) => {
                if (typeof str !== 'string') return str;
                return str.replace(/[\u{1F000}-\u{1FFFF}|\u{2600}-\u{27BF}|\u{FE00}-\u{FEFF}|\u{E000}-\u{F8FF}|\u00D8-\u00DF\u00DF]/gu, '')
                          .replace(/[^\x00-\x7F\u00C0-\u024F\u1E00-\u1EFF]/g, '')
                          .replace(/\s{2,}/g, ' ')
                          .trim();
            };

            const fmt = v => {
                if (v === null || v === undefined || v === '') return null;
                if (Array.isArray(v)) {
                    const mapped = v.map(i => typeof i === 'object' ? JSON.stringify(i) : i).join(', ');
                    return clean(mapped) || null;
                }
                if (typeof v === 'object') return clean(JSON.stringify(v)) || null;
                if (v === 'sim') return 'Sim';
                if (v === 'nao') return 'Nao';
                return clean(String(v)) || null;
            };

            // Friendly labels for select values
            const labelMap = {
                'basico': 'Basico - Usa WhatsApp e planilhas',
                'intermediario': 'Intermediario - Usa CRM, automacoes simples',

                'manha': 'Manha', 'tarde': 'Tarde', 'noite': 'Noite',

                if (v === null || v === undefined || v === '') return null;

                    return clean(result) || null;
                }
                return clean(labelMap[v] || String(v)) || null;
            };

            // === Check page break ===
            const checkPage = (needed) => {
                if (y + needed > 282) { doc.addPage(); y = 15; }

            // === Draw section header ===
            const drawSectionHeader = (title) => {
                checkPage(14);
                doc.setFillColor(232, 119, 46);
                doc.rect(margin, y, pageWidth - margin * 2, 9, 'F');
                doc.setFontSize(10);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(255, 255, 255);
                doc.text(title, margin + 4, y + 6.5);
                y += 13;
            };

            // === Draw label-value row ===
            const drawRow = (label, value, isAlt) => {
                if (value === null) return; // skip empty
                checkPage(8);
                // Alternating background
                if (isAlt) {
                    doc.setFillColor(248, 248, 252);
                    doc.rect(margin, y - 3.5, pageWidth - margin * 2, 0, 'F');
                }
                doc.setFontSize(8.5);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(90, 90, 110);
                doc.text(label, margin + 3, y);

                doc.setFont('helvetica', 'normal');
                doc.setTextColor(30, 30, 46);
                const lines = doc.splitTextToSize(String(value), contentWidth);
                lines.forEach((line, li) => {
                    if (li > 0) checkPage(4.5);
                    doc.text(line, contentStart, y);
                    if (li < lines.length - 1) y += 4.5;
                });
                y += 6;
                // Draw subtle separator line
                doc.setDrawColor(230, 230, 235);
                doc.setLineWidth(0.2);
                doc.line(margin + 2, y - 2.5, pageWidth - margin - 2, y - 2.5);
            };

            // === Draw rows for a section ===
            const drawSection = (title, rows) => {
                const filledRows = rows.filter(([, v]) => v !== null);
                if (filledRows.length === 0) return;
                drawSectionHeader(title);
                filledRows.forEach(([label, value], i) => drawRow(label, value, i % 2 === 0));
                y += 3;
            };

            // === HEADER ===
            doc.setFillColor(12, 12, 20);
            doc.rect(0, 0, pageWidth, 32, 'F');
            doc.setFillColor(232, 119, 46);
            doc.rect(0, 30, pageWidth, 2, 'F');
            doc.setTextColor(232, 119, 46);
            doc.setFontSize(20);
            doc.setFont('helvetica', 'bold');
            doc.text('Agencia DPX', margin, 14);
            doc.setTextColor(200, 200, 210);
            doc.setFontSize(10);
            doc.setFont('helvetica', 'normal');
            doc.text('Formulario de Implementacao de Agente de IA', margin, 22);
            doc.setTextColor(255, 255, 255);
            doc.text('Gerado em: ' + new Date().toLocaleDateString('pt-BR'), pageWidth - margin, 22, { align: 'right' });
            y = 40;

            // === COMPANY NAME + SCORE BAR ===
            doc.setTextColor(30, 30, 46);
            doc.setFontSize(18);
            doc.setFont('helvetica', 'bold');
            doc.text(clean(form.nome_empresa) || 'Sem nome', margin, y);
            y += 7;

            const scoreLabel = form.score <= 30 ? 'Simples' : form.score <= 60 ? 'Moderado' : form.score <= 80 ? 'Complexo' : 'Enterprise';
            const scoreColor = form.score <= 30 ? [52, 211, 153] : form.score <= 60 ? [251, 191, 36] : form.score <= 80 ? [249, 115, 22] : [239, 68, 68];
            // Score bar background
            doc.setFillColor(235, 235, 240);
            doc.roundedRect(margin, y, 60, 4, 2, 2, 'F');
            // Score bar fill
            doc.setFillColor(...scoreColor);
            doc.roundedRect(margin, y, Math.max(60 * form.score / 100, 4), 4, 2, 2, 'F');
            doc.setFontSize(9);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(80, 80, 100);
            doc.text(form.score + '/100 (' + scoreLabel + ')', margin + 64, y + 3.5);
            doc.text('Valor: R$ ' + (form.valor?.toLocaleString('pt-BR') || '---'), pageWidth - margin, y + 3.5, { align: 'right' });
            y += 12;

            // === SECTIONS ===
            drawSection('1. Informacoes da Empresa', [
                ['Nome da Empresa', fmt(d.nome_empresa)],
                ['CNPJ', fmt(d.cnpj)],
                ['Segmento', fmt(d.segmento)],
                ['Endereco', fmt(d.endereco)],
                ['Site', fmt(d.site)],
                ['Colaboradores', fmt(d.num_colaboradores)],
                ['Faturamento Mensal', fmt(d.faturamento)],
                ['Produtos/Servicos', fmt(d.produtos_servicos)],
                ['Publico-Alvo', friendly(d.publico_alvo)],
                ['Historia da Empresa', fmt(d.historia_empresa)],
                ['Missao, Visao e Valores', fmt(d.missao_visao_valores)],
                ['Diferenciais', fmt(d.diferenciais)],
                ['Maturidade Digital', friendly(d.maturidade_digital)],

            drawSection('2. Diagnostico e Objetivos', [

                ['Areas de Cobertura', friendly(d.areas)],
                ['Acoes Praticas do Agente', friendly(d.acoes_praticas)],
                ['Indicadores de Sucesso', friendly(d.indicadores)],

                ['Processo Atual', fmt(d.processo_atual)],

            drawSection('3. Personalidade e Comunicacao', [
                ['Tom de Comunicacao', friendly(d.tom_comunicacao)],
                ['Nome do Agente', fmt(d.nome_agente)],
                ['Usar Emojis', friendly(d.usa_emojis)],

                ['Msg de Encerramento', fmt(d.msg_encerramento)],
                ['Frases Proibidas', fmt(d.frases_proibidas)],

            drawSection('4. Regras de Negocio', [
                ['Horario de Funcionamento', friendly(d.horario_funcionamento)],
                ['Formas de Pagamento', fmt(d.formas_pagamento)],
                ['Politica de Precos', fmt(d.politica_precos)],
                ['Politica de Troca/Devolucao', fmt(d.politica_troca)],
                ['Politica de Garantia', fmt(d.politica_garantia)],
                ['Prazos de Entrega', fmt(d.prazos_entrega)],
                ['Area de Cobertura', fmt(d.area_cobertura)],
                ['Regras Inviolaveis', fmt(d.regras_inviolaveis)],
                ['Informacoes de Frete', fmt(d.info_frete)],

            ]);

            // === Section 5: FAQ - Special formatted ===
            const hasFaq = d.faq && Array.isArray(d.faq) && d.faq.length > 0;
            const hasCenarios = d.cenarios && Array.isArray(d.cenarios) && d.cenarios.length > 0;
            const hasObjecoes = d.objecoes && Array.isArray(d.objecoes) && d.objecoes.length > 0;
            const hasGlossario = d.glossario && Array.isArray(d.glossario) && d.glossario.length > 0;

            if (hasFaq || hasCenarios || hasObjecoes || hasGlossario) {
                drawSectionHeader('5. FAQ e Base de Conhecimento');

                const drawFaqBlock = (title, items, formatFn) => {
                    if (!items || items.length === 0) return;
                    checkPage(10);
                    // Sub-header
                    doc.setFillColor(242, 242, 248);
                    doc.rect(margin + 2, y - 2, pageWidth - margin * 2 - 4, 7, 'F');
                    doc.setFontSize(9);
                    doc.setFont('helvetica', 'bold');
                    doc.setTextColor(80, 80, 100);
                    doc.text(title, margin + 5, y + 2.5);
                    y += 9;

                    items.forEach((item, idx) => {
                        checkPage(12);
                        const lines = formatFn(item, idx);
                        doc.setFontSize(8.5);
                        lines.forEach(({text, bold}) => {
                            checkPage(5);
                            doc.setFont('helvetica', bold ? 'bold' : 'normal');
                            doc.setTextColor(bold ? 60 : 30, bold ? 60 : 30, bold ? 80 : 46);
                            const wrapped = doc.splitTextToSize(clean(text), pageWidth - margin * 2 - 12);
                            wrapped.forEach(wl => {
                                checkPage(4.5);
                                doc.text(wl, margin + 6, y);
                                y += 4.2;
                            });

                        y += 3;
                        // Separator between items
                        if (idx < items.length - 1) {
                            doc.setDrawColor(220, 220, 228);
                            doc.setLineWidth(0.15);

                };

                drawFaqBlock('Perguntas Frequentes', d.faq, (item, i) => [
                    { text: (i+1) + '. Pergunta: ' + (item.pergunta || ''), bold: true },
                    { text: 'Resposta: ' + (item.resposta || ''), bold: false },

                drawFaqBlock('Cenarios de Uso', d.cenarios, (item, i) => [
                    { text: (i+1) + '. ' + (item.titulo || ''), bold: true },
                    { text: 'Situacao: ' + (item.descricao || ''), bold: false },
                    { text: 'Resposta: ' + (item.resposta || ''), bold: false },

                drawFaqBlock('Objecoes Comuns', d.objecoes, (item, i) => [

                    { text: 'Resposta: ' + (item.resposta || ''), bold: false },

                drawFaqBlock('Glossario', d.glossario, (item) => [

            }

            // === Remaining Sections ===
            drawSection('6. Processos e Escalacao', [

            const fmtArquivos = (arr) => {
                if (!arr || !Array.isArray(arr) || arr.length === 0) return null;
                return arr.map((item, i) => (i+1) + '. ' + item.nome + ' (' + item.tamanho_mb + ' MB)').join(', ');
            };

                ['Processar Imagens', friendly(d.processar_imagens)],
                ['Requisitos de Seguranca', friendly(d.seguranca)],
                ['Escalabilidade', fmt(d.escalabilidade)],
            ]);

            drawSection('11. Concorrencia e Mercado', [
                ['Principais Concorrentes', fmt(d.concorrentes)],
                ['Por que Nos Escolher', fmt(d.porque_escolher)],
                ['Nao Falar sobre Concorrentes', fmt(d.nao_falar_concorrentes)],
                ['Cases de Sucesso', fmt(d.cases_sucesso)],
            ]);

            drawSection('12. Contato do Responsavel', [
                ['Nome', fmt(d.responsavel_nome)],
                ['Cargo', fmt(d.responsavel_cargo)],
                ['E-mail', fmt(d.responsavel_email)],
                ['Telefone/WhatsApp', fmt(d.responsavel_telefone)],
            ]);

            drawSection('13. Observacoes Finais', [
                ['Observacoes', fmt(d.observacoes)],
            ]);

            // === FOOTER on all pages ===
            const pageCount = doc.internal.getNumberOfPages();
            for (let i = 1; i <= pageCount; i++) {
                doc.setPage(i);
                // Footer line
                doc.setDrawColor(232, 119, 46);
                doc.setLineWidth(0.5);
                doc.line(margin, 285, pageWidth - margin, 285);
                doc.setFontSize(7.5);
                doc.setTextColor(140, 140, 155);
                doc.text('Agencia DPX - Implementacao de IA', margin, 290);
                doc.text('Pagina ' + i + ' de ' + pageCount, pageWidth - margin, 290, { align: 'right' });
            }

            return doc;
        }

        function exportSinglePDF() {
            if (selectedIndex < 0) { alert('Selecione um formulário'); return; }
            const form = formularios[selectedIndex];
            const doc = buildPDFForForm(form);
            if (!doc) return;
            const safeName = (form.nome_empresa || 'formulario').replace(/[^a-zA-Z0-9]/g, '_').toLowerCase();
            doc.save(`formulario_${safeName}.pdf`);
        }

        function exportPDF() {
            if (formularios.length === 0) { alert('Nenhum formulário para exportar'); return; }
            if (formularios.length === 1) {
                const doc = buildPDFForForm(formularios[0]);
                doc.save('formularios_dpx.pdf');
                return;
            }
            // Multiple forms: one PDF with all
            const { jsPDF } = window.jspdf;
            let combined = null;
            formularios.forEach((form, i) => {
                const doc = buildPDFForForm(form);
                if (i === 0) {
                    combined = doc;
                } else {
                    const pageCount = doc.internal.getNumberOfPages();
                    for (let p = 1; p <= pageCount; p++) {
                        combined.addPage();
                        const srcPage = doc.internal.pages[p];
                        combined.internal.pages[combined.internal.getNumberOfPages()] = srcPage;
                    }
                }
            });
            // Simpler approach: export individual PDFs in a zip, or just export selected
            // For now, export each as separate download
            formularios.forEach((form, i) => {
                const doc = buildPDFForForm(form);
                const safeName = (form.nome_empresa || 'formulario').replace(/[^a-zA-Z0-9]/g, '_').toLowerCase();
                setTimeout(() => doc.save(`formulario_${safeName}.pdf`), i * 500);
            });
        }

        function downloadFile(content, filename, type) {
            const BOM = '\uFEFF';
            const blob = new Blob([BOM + content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
