<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <style>
        * { scrollbar-width: thin; scrollbar-color: #2a2a3e #0c0c14; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0c0c14; }
        ::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 3px; }
        body { background: #0c0c14; }

        .card { background: #111119; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; }
        .card:hover { border-color: rgba(255,255,255,0.1); }

        .btn-action {
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;

            color: #b0b0c0;
        }

        .form-item {
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .form-item:hover { background: rgba(255,255,255,0.03); }
        .form-item.active {
            background: rgba(232,119,46,0.06);
            border-color: rgba(232,119,46,0.2);
        }

        .badge {
            display: inline-flex;

            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;

        .badge-concluido { background: rgba(52,211,153,0.15); color: #34d399; }

        .collapse-header {

            padding: 12px 16px;
            border-radius: 8px;
            transition: background 0.2s;

        .collapse-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }

            background: #111119;

            border-radius: 14px;
            padding: 20px 24px;
        }

        .score-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.06); overflow: hidden; }
        .score-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.4s ease; }

        .detail-row { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .detail-row:last-child { border-bottom: none; }
    </style>

    <script>
        // ==========================================
        // SUPABASE CONFIG
        // ==========================================
        const SUPABASE_URL = 'https://ajxocisljljuqkinfisw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqeG9jaXNsamxqdXFraW5maXN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDIxNjI0MDQsImV4cCI6MjA1NzczODQwNH0.59bJxXH7x3YURZ9xjJOS8rfsKAQl3C5N3x6Z2SX6fMg';

        let supabaseClient = null;
        let currentUser = null;
        let formularios = [];
        let selectedIndex = -1;

        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (e) {
            console.warn('Supabase não disponível');
        }

        // ==========================================
        // AUTH CHECK
        // ==========================================
        (async () => {
            let authenticated = false;

            if (supabaseClient) {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    currentUser = session.user;
                    authenticated = true;
                }
            }

            // Fallback: check localStorage session
            if (!authenticated) {
                const offlineSession = localStorage.getItem('dpx_admin_session');
                if (offlineSession) {
                    const parsed = JSON.parse(offlineSession);
                    // Session valid for 24h
                    if (Date.now() - parsed.timestamp < 86400000) {
                        currentUser = parsed.user;
                        authenticated = true;
                    }
                }
            }

            if (!authenticated) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('userEmail').textContent = currentUser.email;
            loadFormularios();
        })();

        // ==========================================
        // LOGOUT
        // ==========================================
        async function handleLogout() {
            if (supabaseClient) {
                await supabaseClient.auth.signOut();
            }
            localStorage.removeItem('dpx_admin_session');
            window.location.href = 'index.html';
        }

        // ==========================================
        // SCORE DE COMPLEXIDADE (0-100)
        // ==========================================
        function calcularScore(dados) {
            let score = 0;
            const d = dados || {};

            // Canais (0-20 pts)
            const canais = d.canais_atendimento || d.canais || [];
            if (Array.isArray(canais)) {
                score += Math.min(canais.length * 4, 20);
            }

            // Integrações (0-15 pts)
            const integracoes = d.integracoes_necessarias || d.integracoes || [];
            if (Array.isArray(integracoes)) {
                score += Math.min(integracoes.length * 5, 15);
            }

            // Volume atendimentos (0-15 pts)
            const volume = d.volume_atendimentos || d.volume_mensal || '';
            if (volume.includes('1000') || volume.includes('alto') || volume.includes('+')) score += 15;
            else if (volume.includes('500') || volume.includes('médio')) score += 10;
            else if (volume.includes('100') || volume.includes('baixo')) score += 5;

            // Personalização (0-15 pts)
            const personalizacao = d.nivel_personalizacao || d.personalizacao || '';
            if (personalizacao.includes('alto') || personalizacao.includes('total')) score += 15;
            else if (personalizacao.includes('médio') || personalizacao.includes('moderado')) score += 10;
            else if (personalizacao.includes('básico')) score += 5;

            // Multilingue (0-10 pts)
            if (d.multilingue === true || d.multilinguagem === 'sim' || d.idiomas?.length > 1) score += 10;

            // Voz (0-10 pts)
            if (d.atendimento_voz === true || d.voz === 'sim' || (Array.isArray(canais) && canais.some(c => typeof c === 'string' && c.toLowerCase().includes('voz')))) score += 10;

            // Complexidade do FAQ (0-15 pts)
            const faq = d.faq || d.perguntas_frequentes || [];
            if (Array.isArray(faq)) {
                score += Math.min(faq.length * 3, 15);
            }

            return Math.min(score, 100);
        }

        // ==========================================
        // ESTIMATIVA DE PREÇO
        // ==========================================
        function calcularPreco(dados) {
            let preco = 5000; // Base
            const d = dados || {};

            // Faturamento
            const fat = d.faturamento_mensal || d.faturamento || '';
            if (fat.includes('1M') || fat.includes('milhão') || fat.includes('1.000.000')) preco *= 2.5;
            else if (fat.includes('500') || fat.includes('500K')) preco *= 2;
            else if (fat.includes('100') || fat.includes('100K')) preco *= 1.5;

            // Colaboradores
            const colab = parseInt(d.num_colaboradores || d.colaboradores || d.funcionarios || '0');
            if (colab > 100) preco *= 1.5;
            else if (colab > 50) preco *= 1.3;
            else if (colab > 10) preco *= 1.1;

            // Canais
            const canais = d.canais_atendimento || d.canais || [];
            if (Array.isArray(canais)) preco += canais.length * 500;

            // Integrações
            const integracoes = d.integracoes_necessarias || d.integracoes || [];
            if (Array.isArray(integracoes)) preco += integracoes.length * 800;

            // Score de complexidade como fator
            const score = calcularScore(d);
            if (score > 80) preco *= 1.4;
            else if (score > 60) preco *= 1.2;
            else if (score > 30) preco *= 1.1;

            return Math.round(preco);
        }

        // ==========================================
        // LOAD FORMULARIOS
        // ==========================================
        async function loadFormularios() {
            formularios = [];

            // 1. Load from Supabase
            if (supabaseClient) {
                try {
                    const { data, error } = await supabaseClient
                        .from('Formularios - IA')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (!error && data) {
                        data.forEach(row => {
                            formularios.push({
                                id: row.id,
                                source: 'supabase',
                                created_at: row.created_at,
                                dados: row.dados || row,
                                nome_empresa: row.nome_empresa || row.dados?.empresa?.nome || 'Sem nome',
                                responsavel_nome: row.responsavel_nome || row.dados?.contato?.nome || '',
                                responsavel_email: row.responsavel_email || row.dados?.contato?.email || '',
                                status: row.status || 'novo',
                                score: row.score_complexidade || calcularScore(row.dados),
                                valor: row.valor_estimado || calcularPreco(row.dados)
                            });
                        });
                    }
                } catch (e) {
                    console.warn('Erro ao carregar do Supabase:', e);
                }
            }

            // 2. Load from LocalStorage
            loadLocalStorage();

            // 3. Update UI
            renderFormList();
            updateMetrics();
        }

        function loadLocalStorage() {
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('formulario_') || key.startsWith('dpx_form_')) {
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        // Avoid duplicates (check by empresa name + email)
                        const nome = data?.empresa?.nome || data?.nome_empresa || 'Sem nome';
                        const email = data?.contato?.email || data?.responsavel_email || '';
                        const isDuplicate = formularios.some(f =>
                            f.nome_empresa === nome && f.responsavel_email === email && f.source === 'supabase'
                        );
                        if (!isDuplicate) {
                            formularios.push({
                                id: key,
                                source: 'local',
                                created_at: data.created_at || data.timestamp || new Date().toISOString(),
                                dados: data,
                                nome_empresa: nome,
                                responsavel_nome: data?.contato?.nome || data?.responsavel_nome || '',
                                responsavel_email: email,
                                status: data.status || 'novo',
                                score: calcularScore(data),
                                valor: calcularPreco(data)
                            });
                        }
                    } catch (e) { /* skip invalid */ }
                }
            }
        }

        // ==========================================
        // SYNC LOCALSTORAGE → SUPABASE
        // ==========================================
        async function syncLocalStorage() {
            if (!supabaseClient) {
                alert('Supabase não está configurado. Sincronização não disponível.');
                return;
            }

            const localForms = formularios.filter(f => f.source === 'local');
            if (localForms.length === 0) {
                alert('Nenhum formulário local para sincronizar.');
                return;
            }

            let synced = 0;
            for (const form of localForms) {
                try {
                    const { error } = await supabaseClient.from('Formularios - IA').insert({
                        dados: form.dados,
                        nome_empresa: form.nome_empresa,
                        responsavel_nome: form.responsavel_nome,
                        responsavel_email: form.responsavel_email,
                        status: form.status,
                        score_complexidade: form.score,
                        valor_estimado: form.valor,
                        versao_formulario: 'v2.0'
                    });
                    if (!error) {
                        localStorage.removeItem(form.id);
                        synced++;
                    }
                } catch (e) {
                    console.error('Erro ao sincronizar:', e);
                }
            }

            alert(`${synced} de ${localForms.length} formulários sincronizados com sucesso!`);
            loadFormularios();
        }

            if (selectedIndex < 0) return;
            const form = formularios[selectedIndex];

            if (form.source === 'supabase' && supabaseClient) {
                const { error } = await supabaseClient
                    .from('Formularios - IA')
                    .delete()
                    .eq('id', form.id);
                if (error) {

            document.getElementById('detailContent').classList.add('hidden');
            renderFormList();
            updateMetrics();

        function exportCSV() {
            const data = getExportData();
            if (data.length === 0) { alert('Nenhum dado para exportar'); return; }

            const headers = Object.keys(data[0]);
            const csv = [
                headers.join(';'),
                ...data.map(row => headers.map(h => `"${row[h] || ''}"`).join(';'))
            ].join('\n');

            downloadFile(csv, 'formularios_dpx.csv', 'text/csv;charset=utf-8');
        }

        function exportXLSX() {
            const data = getExportData();
            if (data.length === 0) { alert('Nenhum dado para exportar'); return; }

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Formulários');

            // Style header
            const range = XLSX.utils.decode_range(ws['!ref']);
            for (let c = range.s.c; c <= range.e.c; c++) {
                const addr = XLSX.utils.encode_cell({ r: 0, c });
                if (ws[addr]) ws[addr].s = { font: { bold: true } };
            }

            // Column widths
            ws['!cols'] = [
                { wch: 30 }, { wch: 25 }, { wch: 30 }, { wch: 12 },
                { wch: 10 }, { wch: 12 }, { wch: 8 }, { wch: 15 }
            ];

            XLSX.writeFile(wb, 'formularios_dpx.xlsx');
        }

                { title: 'Personalidade e Comunicação', rows: [

                    ['Usar Emojis', fmt(d.usar_emojis)],
                    ['Idioma', fmt(d.idioma)],
                    ['Multilíngue', fmt(d.multilingue)],
                    ['Processar Voz', fmt(d.processar_voz)],
                ]},
                { title: 'Regras de Negócio', rows: [

                    ['Formas de Pagamento', fmt(d.formas_pagamento)],

                    ['Integrações', fmt(d.integracoes)],

                { title: 'Conteúdo e Dados', rows: [

                    ['Formato Dados', fmt(d.formato_dados)],

                    ['Telefone/WhatsApp', fmt(d.responsavel_telefone)],
                ]},
                { title: 'Observações Finais', rows: [
                    ['Expectativas', fmt(d.expectativas)],
                    ['Observações', fmt(d.observacoes)],
                ]},
            ];

            sections.forEach(section => {
                const rows = section.rows.filter(([, v]) => v !== '—');
                if (rows.length === 0) return;

                if (y > 260) { doc.addPage(); y = 15; }

                // Section header
                doc.setFillColor(245, 245, 248);
                doc.rect(14, y - 1, pageWidth - 28, 8, 'F');
                doc.setFontSize(10);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(232, 119, 46);
                doc.text(section.title, 17, y + 4);
                y += 11;

                doc.setFont('helvetica', 'normal');
                doc.setFontSize(9);

                rows.forEach(([label, value]) => {
                    if (y > 275) { doc.addPage(); y = 15; }

                    doc.setTextColor(100, 100, 120);
                    doc.text(label, 17, y);

                    doc.setTextColor(30, 30, 46);
                    const maxWidth = pageWidth - 90;
                    const lines = doc.splitTextToSize(String(value), maxWidth);
                    doc.text(lines, 75, y);
                    y += Math.max(lines.length * 4.5, 5);
                });

                y += 4;
            });

            // Footer
            const pageCount = doc.internal.getNumberOfPages();
            for (let i = 1; i <= pageCount; i++) {
                doc.setPage(i);
                doc.setFontSize(8);
                doc.setTextColor(150, 150, 165);
                doc.text(`Agência DPX — Implementação de IA | Página ${i} de ${pageCount}`, pageWidth / 2, 290, { align: 'center' });
            }

            return doc;
        }

        function exportSinglePDF() {
            if (selectedIndex < 0) { alert('Selecione um formulário'); return; }
            const form = formularios[selectedIndex];
            const doc = buildPDFForForm(form);
            if (!doc) return;
            const safeName = (form.nome_empresa || 'formulario').replace(/[^a-zA-Z0-9]/g, '_').toLowerCase();
            doc.save(`formulario_${safeName}.pdf`);
        }

        function exportPDF() {
            if (formularios.length === 0) { alert('Nenhum formulário para exportar'); return; }
            if (formularios.length === 1) {
                const doc = buildPDFForForm(formularios[0]);
                doc.save('formularios_dpx.pdf');
                return;
            }
            // Multiple forms: one PDF with all
            const { jsPDF } = window.jspdf;
            let combined = null;
            formularios.forEach((form, i) => {
                const doc = buildPDFForForm(form);
                if (i === 0) {
                    combined = doc;
                } else {
                    const pageCount = doc.internal.getNumberOfPages();
                    for (let p = 1; p <= pageCount; p++) {
                        combined.addPage();
                        const srcPage = doc.internal.pages[p];
                        combined.internal.pages[combined.internal.getNumberOfPages()] = srcPage;
                    }
                }
            });
            // Simpler approach: export individual PDFs in a zip, or just export selected
            // For now, export each as separate download
            formularios.forEach((form, i) => {
                const doc = buildPDFForForm(form);
                const safeName = (form.nome_empresa || 'formulario').replace(/[^a-zA-Z0-9]/g, '_').toLowerCase();
                setTimeout(() => doc.save(`formulario_${safeName}.pdf`), i * 500);
            });
        }

        function downloadFile(content, filename, type) {
            const BOM = '\uFEFF';
            const blob = new Blob([BOM + content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
